<script>
let scale = 1;
const svg = document.getElementById('svg');
const wrap = document.getElementById('wrap');
function zoom(d) {
  scale = Math.min(2, Math.max(0.3, scale + d));
  svg.style.transform = `scale(${scale})`;
  svg.style.transformOrigin = 'top left';
  svg.style.width = (1400 * scale) + 'px';
  svg.style.height = (2100 * scale) + 'px';
  document.getElementById('zlabel').textContent = Math.round(scale * 100) + '%';
}
function resetZoom() {
  scale = 1; svg.style.transform = ''; svg.style.width = ''; svg.style.height = '';
  document.getElementById('zlabel').textContent = '100%';
}
let drag = false, sx, sy, sl, st;
wrap.addEventListener('mousedown', e => { drag=true; sx=e.clientX; sy=e.clientY; sl=wrap.scrollLeft; st=wrap.scrollTop; });
wrap.addEventListener('mousemove', e => { if(!drag) return; wrap.scrollLeft=sl-(e.clientX-sx); wrap.scrollTop=st-(e.clientY-sy); });
wrap.addEventListener('mouseup', ()=>drag=false);
wrap.addEventListener('mouseleave', ()=>drag=false);
</script>
</body>
